defaults:
  - model: LCNN
  - metrics: example
  - datasets: ASVspoof_eval # we do not want to run inference on training data
  - dataloader: example
  - transforms: example
  - _self_
inferencer:
  device_tensors: ["data_object", "labels"] # which tensors should be on device (ex. GPU)
  device: auto # device name or "auto"
  save_path: "example" # any name here, can be a dataset name
  seed: 1
  from_pretrained: "data/ASVspoofData/LA/LA/model/checkpoint-epoch3.pth" # path to the pretrained model
